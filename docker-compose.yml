services:
  caddy:
    image: caddy:2-alpine
    container_name: brainwave-caddy
    restart: unless-stopped
    ports:
      - "3005:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - brainwave

  brainwave:
    build: .
    container_name: brainwave-app
    restart: unless-stopped
    expose:
      - "3005"
    env_file:
      - .env
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - OPENAI_REALTIME_MODEL=${OPENAI_REALTIME_MODEL:-gpt-realtime-mini-2025-12-15}
      - OPENAI_REALTIME_MODALITIES=${OPENAI_REALTIME_MODALITIES:-text}

volumes:
  caddy_data:
  caddy_config:
